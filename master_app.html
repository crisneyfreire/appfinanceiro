<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 MASTER APP - CONTROLE TOTAL</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0f;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #00ffaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #00ffaa;
            font-size: 24px;
        }

        .status-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-item {
            background: #2a2a40;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary {
            background: #00ffaa;
            color: black;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00ffaa;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-warning:hover {
            background: #f57c00;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #00ffaa;
            color: #00ffaa;
        }

        .btn-outline:hover {
            background: #00ffaa;
            color: black;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        /* Painel de Clientes */
        .clientes-panel {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #00ffaa;
        }

        .panel-title {
            color: #00ffaa;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            background: #2a2a40;
            border: 1px solid #404040;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }

        .clientes-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .stat-tag {
            background: #2a2a40;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            border: 1px solid #404040;
        }

        .clientes-lista {
            max-height: 500px;
            overflow-y: auto;
        }

        .cliente-item {
            background: #2a2a40;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .cliente-item:hover {
            border-color: #00ffaa;
            transform: translateX(5px);
        }

        .cliente-item.active {
            border-color: #00ffaa;
            background: #33334d;
        }

        .cliente-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .cliente-nome {
            font-weight: bold;
            font-size: 14px;
        }

        .cliente-status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        .status-ativo {
            background: #4caf50;
            color: white;
        }

        .status-bloqueado {
            background: #f44336;
            color: white;
        }

        .status-teste {
            background: #ff9800;
            color: white;
        }

        .cliente-info {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #b0b0b0;
            margin-bottom: 10px;
        }

        .cliente-actions {
            display: flex;
            gap: 5px;
            justify-content: flex-end;
        }

        .action-icon {
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            background: #404040;
        }

        .action-icon:hover {
            background: #00ffaa;
            color: black;
        }

        .action-icon.danger:hover {
            background: #f44336;
            color: white;
        }

        /* Editor Panel */
        .editor-panel {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            border-top: 4px solid #00ffaa;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid #404040;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 15px;
            background: #2a2a40;
            border: 1px solid #404040;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .tab:hover {
            border-color: #00ffaa;
        }

        .tab.active {
            background: #00ffaa;
            color: black;
            border-color: #00ffaa;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #b0b0b0;
            font-size: 12px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: #2a2a40;
            border: 1px solid #404040;
            border-radius: 5px;
            color: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #00ffaa;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .config-card {
            background: #2a2a40;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00ffaa;
        }

        .config-card h4 {
            color: #00ffaa;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .config-list {
            max-height: 200px;
            overflow-y: auto;
            background: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            background: #2a2a40;
            margin-bottom: 5px;
            border-radius: 3px;
            font-size: 12px;
        }

        .config-item-actions {
            display: flex;
            gap: 5px;
        }

        .config-item-btn {
            background: none;
            border: none;
            color: #b0b0b0;
            cursor: pointer;
            padding: 2px 5px;
            font-size: 11px;
        }

        .config-item-btn:hover {
            color: #00ffaa;
        }

        .config-item-btn.danger:hover {
            color: #f44336;
        }

        .add-config-form {
            display: flex;
            gap: 5px;
        }

        .add-config-input {
            flex: 1;
            padding: 8px;
            background: #1a1a2e;
            border: 1px solid #404040;
            border-radius: 5px;
            color: white;
        }

        .bank-icon {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-left: 4px solid #00ffaa;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #00ffaa;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .warning-message {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid #ff9800;
            color: #ff9800;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 30px;
        }

        .loading-spinner {
            border: 3px solid #404040;
            border-top: 3px solid #00ffaa;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .w-100 { width: 100%; }
        .flex { display: flex; gap: 10px; }
        .mt-20 { margin-top: 20px; }
        .mb-10 { margin-bottom: 10px; }
        .text-success { color: #4caf50; }
        .text-danger { color: #f44336; }
        .text-warning { color: #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div>
                <h1>👑 MASTER APP</h1>
                <div style="font-size: 12px; color: #b0b0b0;">Controle Total dos Clientes</div>
            </div>
            <div class="status-bar">
                <div class="status-item" id="firebaseStatus">🔄 Conectando...</div>
                <div class="status-item" id="clientesCount">📊 0 clientes</div>
                <button class="btn btn-primary btn-sm" onclick="mostrarAjuda()">🚀 Ajuda</button>
            </div>
        </div>

        <!-- MENSAGENS -->
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        <div id="warningMessage" class="warning-message"></div>

        <!-- GRID PRINCIPAL -->
        <div class="main-grid">
            <!-- PAINEL DE CLIENTES -->
            <div class="clientes-panel">
                <div class="panel-title">
                    <span>📋 CLIENTES</span>
                    <span class="stat-tag" id="totalClientesTag">0</span>
                </div>

                <input type="text" class="search-box" id="buscarCliente" placeholder="🔍 Buscar cliente..." onkeyup="filtrarClientes()">

                <div class="clientes-stats">
                    <span class="stat-tag" id="ativosCount">✅ Ativos: 0</span>
                    <span class="stat-tag" id="bloqueadosCount">🔒 Bloqueados: 0</span>
                </div>

                <button class="btn btn-primary w-100 mb-10" onclick="mostrarModalNovoCliente()">➕ NOVO CLIENTE</button>

                <div class="clientes-lista" id="listaClientes">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Carregando...
                    </div>
                </div>
            </div>

            <!-- EDITOR PANEL -->
            <div class="editor-panel" id="editorPanel">
                <!-- TABS -->
                <div class="tabs">
                    <button class="tab active" onclick="mudarAba('dados', this)">📋 Dados</button>
                    <button class="tab" onclick="mudarAba('categorias', this)">🏷️ Categorias</button>
                    <button class="tab" onclick="mudarAba('contas', this)">💳 Contas</button>
                    <button class="tab" onclick="mudarAba('tipos', this)">🔄 Tipos</button>
                    <button class="tab" onclick="mudarAba('bancos', this)">🏦 Bancos</button>
                </div>

                <!-- ABA DADOS DO CLIENTE -->
                <div id="abaDados" class="tab-content active">
                    <h3 style="margin-bottom: 20px;">📋 DADOS DO CLIENTE</h3>
                    
                    <div class="form-group">
                        <label>ID do Cliente</label>
                        <input type="text" id="clienteId" class="form-control" readonly disabled style="background: #333;">
                    </div>
                    
                    <div class="form-group">
                        <label>Nome da Empresa *</label>
                        <input type="text" id="nomeEmpresa" class="form-control" placeholder="Ex: Empresa XYZ">
                    </div>
                    
                    <div class="form-group">
                        <label>Status</label>
                        <select id="statusCliente" class="form-control">
                            <option value="ativo">Ativo</option>
                            <option value="bloqueado">Bloqueado</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Cor Principal</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="color" id="corCliente" value="#4CAF50" style="width: 50px; height: 40px;">
                            <input type="text" id="corHex" value="#4CAF50" class="form-control" placeholder="#COR">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Modo Escuro</label>
                        <select id="modoEscuro" class="form-control">
                            <option value="auto">Automático</option>
                            <option value="light">Claro</option>
                            <option value="dark">Escuro</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="emailCliente" class="form-control" placeholder="email@exemplo.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="telefoneCliente" class="form-control" placeholder="(00) 00000-0000">
                    </div>
                    
                    <div class="flex">
                        <button class="btn btn-primary w-100" onclick="salvarDadosCliente()">💾 SALVAR DADOS</button>
                    </div>
                </div>

                <!-- ABA CATEGORIAS -->
                <div id="abaCategorias" class="tab-content">
                    <h3 style="margin-bottom: 20px;">🏷️ CATEGORIAS</h3>
                    
                    <div class="config-list" id="listaCategorias" style="max-height: 300px;">
                        <div class="loading">Carregando...</div>
                    </div>
                    
                    <div class="add-config-form">
                        <input type="text" id="novaCategoria" class="add-config-input" placeholder="Nova categoria...">
                        <button class="btn btn-primary btn-sm" onclick="adicionarCategoria()">➕</button>
                    </div>
                    
                    <div class="flex mt-20">
                        <button class="btn btn-primary w-100" onclick="salvarCategorias()">💾 SALVAR CATEGORIAS</button>
                    </div>
                </div>

                <!-- ABA CONTAS -->
                <div id="abaContas" class="tab-content">
                    <h3 style="margin-bottom: 20px;">💳 CONTAS</h3>
                    
                    <div class="config-list" id="listaContas" style="max-height: 300px;">
                        <div class="loading">Carregando...</div>
                    </div>
                    
                    <div class="add-config-form">
                        <input type="text" id="novaConta" class="add-config-input" placeholder="Nova conta...">
                        <button class="btn btn-primary btn-sm" onclick="adicionarConta()">➕</button>
                    </div>
                    
                    <div class="flex mt-20">
                        <button class="btn btn-primary w-100" onclick="salvarContas()">💾 SALVAR CONTAS</button>
                    </div>
                </div>

                <!-- ABA TIPOS -->
                <div id="abaTipos" class="tab-content">
                    <h3 style="margin-bottom: 20px;">🔄 TIPOS DE LANÇAMENTO</h3>
                    
                    <div class="config-list" id="listaTipos" style="max-height: 300px;">
                        <div class="loading">Carregando...</div>
                    </div>
                    
                    <div class="add-config-form">
                        <input type="text" id="novoTipo" class="add-config-input" placeholder="Novo tipo...">
                        <select id="novoTipoNatureza" class="add-config-input" style="flex: 0.5;">
                            <option value="entrada">📥 Entrada</option>
                            <option value="saida">📤 Saída</option>
                        </select>
                        <button class="btn btn-primary btn-sm" onclick="adicionarTipo()">➕</button>
                    </div>
                    
                    <div class="flex mt-20">
                        <button class="btn btn-primary w-100" onclick="salvarTipos()">💾 SALVAR TIPOS</button>
                    </div>
                </div>

                <!-- ABA BANCOS -->
                <div id="abaBancos" class="tab-content">
                    <h3 style="margin-bottom: 20px;">🏦 BANCOS</h3>
                    
                    <button class="btn btn-primary w-100 mb-10" onclick="mostrarModalBanco()">
                        <i class="fas fa-plus"></i> NOVO BANCO
                    </button>
                    
                    <div class="config-list" id="listaBancos" style="max-height: 400px;">
                        <div class="loading">Carregando...</div>
                    </div>
                    
                    <div class="flex mt-20">
                        <button class="btn btn-primary w-100" onclick="salvarBancos()">💾 SALVAR BANCOS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL NOVO CLIENTE -->
    <div id="modalNovoCliente" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ NOVO CLIENTE</h2>
                <button class="modal-close" onclick="fecharModalNovoCliente()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nome da Empresa *</label>
                    <input type="text" id="novoClienteNome" class="form-control" placeholder="Ex: Empresa XYZ">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="novoClienteEmail" class="form-control" placeholder="email@exemplo.com">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="novoClienteTelefone" class="form-control" placeholder="(00) 00000-0000">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="criarCliente()">CRIAR</button>
                <button class="btn btn-outline" onclick="fecharModalNovoCliente()">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL BANCO -->
    <div id="modalBanco" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="modalBancoTitulo">🏦 NOVO BANCO</h2>
                <button class="modal-close" onclick="fecharModalBanco()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="bancoIndex" value="-1">
                
                <div class="form-group">
                    <label>Nome do Banco *</label>
                    <input type="text" id="bancoNome" class="form-control" placeholder="Ex: Itaú, Bradesco...">
                </div>
                
                <div class="form-group">
                    <label>Cor</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="color" id="bancoCor" value="#4CAF50" style="width: 50px; height: 40px;">
                        <input type="text" id="bancoCorHex" value="#4CAF50" class="form-control">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Ícone</label>
                    <select id="bancoIcone" class="form-control">
                        <option value="fa-university">🏛️ Padrão</option>
                        <option value="fa-building">🏢 Edifício</option>
                        <option value="fa-credit-card">💳 Cartão</option>
                        <option value="fa-money-bill">💰 Dinheiro</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Formato do Extrato</label>
                    <select id="bancoFormato" class="form-control">
                        <option value="ofx">OFX</option>
                        <option value="csv">CSV Genérico</option>
                        <option value="csv_itau">CSV Itaú</option>
                        <option value="csv_bradesco">CSV Bradesco</option>
                        <option value="csv_nubank">CSV Nubank</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Posição da Data (coluna)</label>
                    <input type="text" id="bancoPosData" class="form-control" value="0" placeholder="0, 1, A, B...">
                </div>
                
                <div class="form-group">
                    <label>Posição da Descrição</label>
                    <input type="text" id="bancoPosDesc" class="form-control" value="1">
                </div>
                
                <div class="form-group">
                    <label>Posição do Valor</label>
                    <input type="text" id="bancoPosValor" class="form-control" value="2">
                </div>
                
                <div class="form-group">
                    <label>Formato da Data</label>
                    <select id="bancoFormatoData" class="form-control">
                        <option value="dd/mm/yyyy">DD/MM/AAAA</option>
                        <option value="yyyy-mm-dd">AAAA-MM-DD</option>
                        <option value="dd-mm-yyyy">DD-MM-AAAA</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="salvarBanco()">SALVAR</button>
                <button class="btn btn-outline" onclick="fecharModalBanco()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyArkRZLVVJNzx6I6GcWVF7NnjIkrF1jrcU",
            authDomain: "painelmastercomplet.firebaseapp.com",
            projectId: "painelmastercomplet",
            storageBucket: "painelmastercomplet.firebasestorage.app",
            messagingSenderId: "87580974705",
            appId: "1:87580974705:web:bd17f8609687f25ee4c5d0"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let clientes = [];
        let clienteAtual = null;
        let unsubscribeClientes = null;

        // Dados do cliente atual
        let categoriasCliente = [];
        let contasCliente = [];
        let tiposCliente = [];
        let bancosCliente = [];

        // ============================================
        // FUNÇÕES DE UTILIDADE
        // ============================================
        function mostrarSucesso(msg) {
            const el = document.getElementById('successMessage');
            el.innerHTML = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function mostrarErro(msg) {
            const el = document.getElementById('errorMessage');
            el.innerHTML = '❌ ' + msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function mostrarAviso(msg) {
            const el = document.getElementById('warningMessage');
            el.innerHTML = '⚠️ ' + msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // ============================================
        // CARREGAR CLIENTES DO FIREBASE
        // ============================================
        function carregarClientes() {
            document.getElementById('firebaseStatus').innerHTML = '🔄 Conectando...';

            if (unsubscribeClientes) {
                unsubscribeClientes();
            }

            unsubscribeClientes = db.collection('clientes').onSnapshot((snapshot) => {
                clientes = [];
                let ativos = 0, bloqueados = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const cliente = {
                        id: doc.id,
                        nome: data.nome || 'Sem nome',
                        status: data.status || 'ativo',
                        email: data.email || '',
                        telefone: data.telefone || '',
                        cor: data.cor || '#4CAF50',
                        modoEscuro: data.modoEscuro || 'auto',
                        dataCriacao: data.dataCriacao || new Date().toISOString()
                    };
                    clientes.push(cliente);
                    
                    if (cliente.status === 'ativo') ativos++;
                    else if (cliente.status === 'bloqueado') bloqueados++;
                });

                clientes.sort((a, b) => a.nome.localeCompare(b.nome));

                document.getElementById('clientesCount').innerHTML = `📊 ${clientes.length} clientes`;
                document.getElementById('ativosCount').innerHTML = `✅ Ativos: ${ativos}`;
                document.getElementById('bloqueadosCount').innerHTML = `🔒 Bloqueados: ${bloqueados}`;
                document.getElementById('totalClientesTag').innerHTML = clientes.length;
                document.getElementById('firebaseStatus').innerHTML = '🟢 Conectado';

                atualizarListaClientes();

                if (clienteAtual) {
                    const atualizado = clientes.find(c => c.id === clienteAtual.id);
                    if (atualizado) {
                        clienteAtual = atualizado;
                        preencherDadosCliente();
                    }
                }
            }, (error) => {
                document.getElementById('firebaseStatus').innerHTML = '🔴 Erro';
                mostrarErro('Erro ao conectar: ' + error.message);
            });
        }

        function atualizarListaClientes() {
            const lista = document.getElementById('listaClientes');
            const filtro = document.getElementById('buscarCliente').value.toLowerCase();

            if (clientes.length === 0) {
                lista.innerHTML = '<div style="padding: 20px; text-align: center; color: #b0b0b0;">📭 Nenhum cliente</div>';
                return;
            }

            const filtrados = clientes.filter(c => 
                c.nome.toLowerCase().includes(filtro) || 
                c.id.toLowerCase().includes(filtro)
            );

            if (filtrados.length === 0) {
                lista.innerHTML = '<div style="padding: 20px; text-align: center; color: #b0b0b0;">🔍 Nenhum resultado</div>';
                return;
            }

            let html = '';
            filtrados.forEach(c => {
                const ativo = clienteAtual && clienteAtual.id === c.id;
                const statusClass = c.status === 'ativo' ? 'status-ativo' : 'status-bloqueado';
                const statusText = c.status === 'ativo' ? 'ATIVO' : 'BLOQUEADO';

                html += `
                    <div class="cliente-item ${ativo ? 'active' : ''}" onclick="selecionarCliente('${c.id}')">
                        <div class="cliente-header">
                            <span class="cliente-nome">${c.nome}</span>
                            <span class="cliente-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="cliente-info">
                            <span>📧 ${c.email || 'Sem email'}</span>
                        </div>
                        <div class="cliente-actions">
                            <span class="action-icon" onclick="copiarLink('${c.id}'); event.stopPropagation()">🔗</span>
                            <span class="action-icon" onclick="visualizarCliente('${c.id}'); event.stopPropagation()">👁️</span>
                            <span class="action-icon danger" onclick="excluirCliente('${c.id}'); event.stopPropagation()">🗑️</span>
                        </div>
                    </div>
                `;
            });

            lista.innerHTML = html;
        }

        // ============================================
        // SELEÇÃO DE CLIENTE
        // ============================================
        async function selecionarCliente(id) {
            const cliente = clientes.find(c => c.id === id);
            if (!cliente) return;

            clienteAtual = cliente;
            atualizarListaClientes();
            preencherDadosCliente();
            
            await carregarConfiguracoesCliente();
        }

        function preencherDadosCliente() {
            if (!clienteAtual) return;

            document.getElementById('clienteId').value = clienteAtual.id;
            document.getElementById('nomeEmpresa').value = clienteAtual.nome || '';
            document.getElementById('statusCliente').value = clienteAtual.status || 'ativo';
            document.getElementById('corCliente').value = clienteAtual.cor || '#4CAF50';
            document.getElementById('corHex').value = clienteAtual.cor || '#4CAF50';
            document.getElementById('modoEscuro').value = clienteAtual.modoEscuro || 'auto';
            document.getElementById('emailCliente').value = clienteAtual.email || '';
            document.getElementById('telefoneCliente').value = clienteAtual.telefone || '';
        }

        // ============================================
        // CARREGAR CONFIGURAÇÕES DO CLIENTE
        // ============================================
        async function carregarConfiguracoesCliente() {
            if (!clienteAtual) return;

            try {
                // Categorias
                const catDoc = await db.collection('configuracoes').doc(clienteAtual.id).collection('categorias').get();
                if (!catDoc.empty) {
                    categoriasCliente = [];
                    catDoc.forEach(doc => categoriasCliente.push(doc.data().nome));
                } else {
                    categoriasCliente = [
                        'Alimentação', 'Transporte', 'Moradia', 'Saúde',
                        'Educação', 'Lazer', 'Salário', 'Investimentos',
                        'Vendas', 'Serviços', 'Impostos', 'Outros'
                    ];
                }

                // Contas
                const contasDoc = await db.collection('configuracoes').doc(clienteAtual.id).collection('contas').get();
                if (!contasDoc.empty) {
                    contasCliente = [];
                    contasDoc.forEach(doc => contasCliente.push(doc.data().nome));
                } else {
                    contasCliente = ['Carteira', 'Conta Corrente', 'Poupança', 'Cartão de Crédito'];
                }

                // Tipos
                const tiposDoc = await db.collection('configuracoes').doc(clienteAtual.id).collection('tipos').get();
                if (!tiposDoc.empty) {
                    tiposCliente = [];
                    tiposDoc.forEach(doc => tiposCliente.push(doc.data()));
                } else {
                    tiposCliente = [
                        { nome: 'Entrada', natureza: 'entrada' },
                        { nome: 'Saída', natureza: 'saida' }
                    ];
                }

                // Bancos
                const bancosDoc = await db.collection('configuracoes').doc(clienteAtual.id).collection('bancos').get();
                if (!bancosDoc.empty) {
                    bancosCliente = [];
                    bancosDoc.forEach(doc => bancosCliente.push(doc.data()));
                } else {
                    bancosCliente = [
                        {
                            nome: 'Itaú',
                            cor: '#EC7000',
                            icone: 'fa-university',
                            formato: 'csv_itau',
                            posData: 0,
                            posDesc: 1,
                            posValor: 2,
                            posTipo: 3,
                            formatoData: 'dd/mm/yyyy'
                        },
                        {
                            nome: 'Bradesco',
                            cor: '#CC092F',
                            icone: 'fa-building',
                            formato: 'csv_bradesco',
                            posData: 0,
                            posDesc: 1,
                            posValor: 3,
                            posTipo: 4,
                            formatoData: 'dd/mm/yyyy'
                        },
                        {
                            nome: 'Nubank',
                            cor: '#820AD1',
                            icone: 'fa-credit-card',
                            formato: 'csv_nubank',
                            posData: 0,
                            posDesc: 1,
                            posValor: 2,
                            posTipo: '',
                            formatoData: 'dd/mm/yyyy'

                    ];

                atualizarListas();
                mostrarSucesso('✅ Configurações carregadas!');

            } catch (error) {
                console.error('Erro ao carregar:', error);
                
                // Fallback para valores padrão
                categoriasCliente = [
                    'Alimentação', 'Transporte', 'Moradia', 'Saúde',
                    'Educação', 'Lazer', 'Salário', 'Investimentos',
                    'Vendas', 'Serviços', 'Impostos', 'Outros'
                ];
                contasCliente = ['Carteira', 'Conta Corrente', 'Poupança', 'Cartão de Crédito'];
                tiposCliente = [
                    { nome: 'Entrada', natureza: 'entrada' },
                    { nome: 'Saída', natureza: 'saida' }
                ];
                bancosCliente = [];
                
                atualizarListas();
                mostrarAviso('Usando valores padrão');

            const novo = prompt('Editar categoria:', categoriasCliente[index]);
            if (novo && novo !== categoriasCliente[index]) {
                categoriasCliente[index] = novo;
                atualizarListaCategorias();
            }

            if (confirm('Remover esta categoria?')) {

        async function salvarCategorias() {
            if (!clienteAtual) {
                mostrarErro('Selecione um cliente');
                return;
            }

            try {
                const batch = db.batch();
                const ref = db.collection('configuracoes').doc(clienteAtual.id).collection('categorias');
                
                // Apagar antigas
                const old = await ref.get();
                old.forEach(doc => batch.delete(doc.ref));
                
                // Adicionar novas
                categoriasCliente.forEach(nome => {
                    const docRef = ref.doc();
                    batch.set(docRef, { nome });
                });
                
                await batch.commit();
                mostrarSucesso('✅ Categorias salvas!');
            } catch (error) {
                mostrarErro('Erro ao salvar: ' + error.message);
            }
        }

        function mostrarModalBanco() {
            if (!clienteAtual) {
                mostrarErro('Selecione um cliente primeiro!');

            document.getElementById('bancoIndex').value = '-1';
            document.getElementById('modalBancoTitulo').textContent = '🏦 NOVO BANCO';
            document.getElementById('bancoNome').value = '';
            document.getElementById('bancoCor').value = '#4CAF50';

            document.getElementById('bancoFormato').value = 'ofx';

            document.getElementById('modalBanco').style.display = 'flex';

        function editarBanco(index) {
            const banco = bancosCliente[index];
            if (!banco) return;
            
            document.getElementById('bancoIndex').value = index;
            document.getElementById('modalBancoTitulo').textContent = `✏️ EDITAR: ${banco.nome}`;
            document.getElementById('bancoNome').value = banco.nome || '';
            document.getElementById('bancoCor').value = banco.cor || '#4CAF50';
            document.getElementById('bancoCorHex').value = banco.cor || '#4CAF50';
            document.getElementById('bancoIcone').value = banco.icone || 'fa-university';

            document.getElementById('bancoPosDesc').value = banco.posDesc || '1';
            document.getElementById('bancoPosValor').value = banco.posValor || '2';
            document.getElementById('bancoFormatoData').value = banco.formatoData || 'dd/mm/yyyy';
            
            document.getElementById('modalBanco').style.display = 'flex';
        }

        function salvarBanco() {
            const index = parseInt(document.getElementById('bancoIndex').value);
            const nome = document.getElementById('bancoNome').value.trim();
            
            if (!nome) {
                mostrarErro('Nome é obrigatório!');
                return;
            }
            
            const banco = {
                nome: nome,
                cor: document.getElementById('bancoCor').value,
                icone: document.getElementById('bancoIcone').value,
                formato: document.getElementById('bancoFormato').value,
                posData: document.getElementById('bancoPosData').value,
                posDesc: document.getElementById('bancoPosDesc').value,
                posValor: document.getElementById('bancoPosValor').value,
                posTipo: '',
                formatoData: document.getElementById('bancoFormatoData').value
            };
            
            if (index === -1) {
                bancosCliente.push(banco);
                mostrarSucesso(`Banco "${nome}" adicionado!`);
            } else {
                bancosCliente[index] = banco;
                mostrarSucesso(`Banco "${nome}" atualizado!`);
            }
            
            atualizarListaBancos();
            fecharModalBanco();
        }

        function removerBanco(index) {
            if (confirm('Remover este banco?')) {
                const removido = bancosCliente.splice(index, 1)[0];
                atualizarListaBancos();
                mostrarSucesso(`Banco "${removido.nome}" removido!`);
            }
        }

                return;

                const batch = db.batch();
                const ref = db.collection('configuracoes').doc(clienteAtual.id).collection('bancos');
                
                const old = await ref.get();
                old.forEach(doc => batch.delete(doc.ref));
                
                bancosCliente.forEach(banco => {
                    const docRef = ref.doc();
                    batch.set(docRef, banco);
                });
                
                await batch.commit();
                mostrarSucesso('✅ Bancos salvos!');
            } catch (error) {
                mostrarErro('Erro ao salvar: ' + error.message);
            }
        }

        function fecharModalBanco() {
            document.getElementById('modalBanco').style.display = 'none';

        // ============================================
        // DADOS DO CLIENTE
        // ============================================
        async function salvarDadosCliente() {
            if (!clienteAtual) {
                mostrarErro('Selecione um cliente');
                return;
            }

            const nome = document.getElementById('nomeEmpresa').value.trim();
            if (!nome) {
                mostrarErro('Nome é obrigatório!');
                return;
            }

            const dados = {
                nome: nome,
                status: document.getElementById('statusCliente').value,
                cor: document.getElementById('corCliente').value,
                modoEscuro: document.getElementById('modoEscuro').value,
                email: document.getElementById('emailCliente').value,
                telefone: document.getElementById('telefoneCliente').value,
                atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('clientes').doc(clienteAtual.id).update(dados);
                mostrarSucesso('✅ Dados salvos!');
            } catch (error) {
                mostrarErro('Erro ao salvar: ' + error.message);
            }
        }

        // ============================================
        // AÇÕES DE CLIENTE
        // ============================================
        function copiarLink(id) {
            const url = window.location.origin + '/appfinanceiro.html?cliente=' + id;
            navigator.clipboard.writeText(url).then(() => {
                mostrarSucesso('✅ Link copiado!');
            }).catch(() => {
                prompt('Copie o link:', url);
            });
        }

        function visualizarCliente(id) {
            window.open('/appfinanceiro.html?cliente=' + id, '_blank');
        }

        async function excluirCliente(id) {
            if (!confirm('⚠️ Excluir este cliente permanentemente?')) return;
            
            try {
                await db.collection('clientes').doc(id).delete();
                mostrarSucesso('✅ Cliente excluído!');
                
                if (clienteAtual && clienteAtual.id === id) {
                    clienteAtual = null;
                    document.getElementById('clienteId').value = '';
                    document.getElementById('nomeEmpresa').value = '';
                }
            } catch (error) {
                mostrarErro('Erro ao excluir: ' + error.message);
            }
        }

        // ============================================
        // NOVO CLIENTE
        // ============================================
        function mostrarModalNovoCliente() {
            document.getElementById('novoClienteNome').value = '';
            document.getElementById('novoClienteEmail').value = '';
            document.getElementById('novoClienteTelefone').value = '';
            document.getElementById('modalNovoCliente').style.display = 'flex';
        }

        function fecharModalNovoCliente() {
            document.getElementById('modalNovoCliente').style.display = 'none';
        }

        async function criarCliente() {
            const nome = document.getElementById('novoClienteNome').value.trim();
            if (!nome) {
                mostrarErro('Nome é obrigatório!');
                return;
            }

            const novoCliente = {
                nome: nome,
                status: 'ativo',
                cor: '#4CAF50',
                modoEscuro: 'auto',
                email: document.getElementById('novoClienteEmail').value,
                telefone: document.getElementById('novoClienteTelefone').value,
                dataCriacao: new Date().toISOString(),
                criadoEm: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('clientes').add(novoCliente);
                mostrarSucesso('✅ Cliente criado!');
                fecharModalNovoCliente();
            } catch (error) {
                mostrarErro('Erro ao criar: ' + error.message);
            }
        }

        // ============================================
        // UTILITÁRIOS
        // ============================================
        function mudarAba(aba, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            
            document.getElementById('aba' + aba.charAt(0).toUpperCase() + aba.slice(1)).classList.add('active');
            btn.classList.add('active');
            
            if (clienteAtual && (aba === 'categorias' || aba === 'contas' || aba === 'tipos' || aba === 'bancos')) {
                carregarConfiguracoesCliente();
            }
        }

        function filtrarClientes() {
            atualizarListaClientes();
        }

        function mostrarAjuda() {
            alert('MASTER APP v1.0\n\nComo usar:\n\n1. Clientes aparecem automaticamente\n2. Selecione um cliente\n3. Configure categorias, contas, tipos e bancos\n4. Clique em "SALVAR" em cada aba\n5. Use o link gerado para acessar o app financeiro');
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        window.onload = function() {
            carregarClientes();
            
            document.getElementById('corCliente').addEventListener('input', function(e) {
                document.getElementById('corHex').value = e.target.value;
            });
            
            document.getElementById('corHex').addEventListener('input', function(e) {
                document.getElementById('corCliente').value = e.target.value;
            });
            
            document.getElementById('bancoCor').addEventListener('input', function(e) {
                document.getElementById('bancoCorHex').value = e.target.value;
            });
            
            document.getElementById('bancoCorHex').addEventListener('input', function(e) {
                document.getElementById('bancoCor').value = e.target.value;
            });
        };
    </script>
</body>
</html>
