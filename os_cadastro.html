<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Cadastro - APP SERVIÇO</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cadastro-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .cadastro-card h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .cadastro-card p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .link-cliente {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
            word-break: break-all;
            display: none;
        }

        .link-cliente a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .erro {
            color: #f44336;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="cadastro-card">
        <h1>📝 Cadastro de Cliente</h1>
        <p>Preencha para começar a usar o APP SERVIÇO</p>
        
        <div class="form-group">
            <label>Nome da Empresa / Cliente</label>
            <input type="text" id="nomeCliente" placeholder="Ex: Transportes Silva">
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="emailCliente" placeholder="contato@empresa.com">
        </div>
        
        <div class="form-group">
            <label>Telefone / WhatsApp</label>
            <input type="text" id="telefoneCliente" placeholder="(11) 99999-9999">
        </div>
        
        <div class="form-group">
            <label>CPF / CNPJ</label>
            <input type="text" id="documentoCliente" placeholder="00.000.000/0000-00">
        </div>
        
        <button class="btn" onclick="cadastrarCliente()">📱 CADASTRAR E ACESSAR</button>
        
        <div class="link-cliente" id="linkCliente">
            <p>✅ Cliente cadastrado!</p>
            <p>Link de acesso:</p>
            <a href="#" id="linkAcesso" target="_blank"></a>
            <p style="font-size: 12px; margin-top: 10px;">Salve este link para acessar o sistema</p>
        </div>
        
        <div class="erro" id="erroMsg"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArkRZLVVJNzx6I6GcWVF7NnjIkrF1jrcU",
            authDomain: "painelmastercomplet.firebaseapp.com",
            projectId: "painelmastercomplet",
            storageBucket: "painelmastercomplet.firebasestorage.app",
            messagingSenderId: "87580974705",
            appId: "1:87580974705:web:bd17f8609687f25ee4c5d0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const MEU_ID = 'prestador_principal'; // SEU ID FIXO

        async function cadastrarCliente() {
            const nome = document.getElementById('nomeCliente').value;
            const email = document.getElementById('emailCliente').value;
            const telefone = document.getElementById('telefoneCliente').value;
            const documento = document.getElementById('documentoCliente').value;

            if (!nome || !email) {
                mostrarErro('Preencha nome e email!');
                return;
            }

            try {
                // Verificar se app está ativo
                const config = await db.collection('config_global').doc('apps').get();
                if (config.exists && config.data().os && !config.data().os.ativo) {
                    mostrarErro('Sistema em manutenção. Tente novamente mais tarde.');
                    return;
                }

                const clienteData = {
                    nome: nome,
                    email: email,
                    telefone: telefone,
                    documento: documento,
                    dataCadastro: new Date().toISOString(),
                    status: 'ativo',
                    prestadorId: MEU_ID
                };

                const docRef = await db.collection('clientes_os').add(clienteData);
                const clienteId = docRef.id;

                const baseUrl = window.location.origin + window.location.pathname.replace('os_cadastro.html', '');
                const linkAcesso = `${baseUrl}os_cliente.html?cliente=${clienteId}`;

                const linkDiv = document.getElementById('linkCliente');
                const linkElement = document.getElementById('linkAcesso');
                linkElement.href = linkAcesso;
                linkElement.textContent = linkAcesso;
                linkDiv.style.display = 'block';

                document.getElementById('erroMsg').style.display = 'none';
                document.getElementById('nomeCliente').value = '';
                document.getElementById('emailCliente').value = '';

            } catch (error) {
                console.error('Erro:', error);
                mostrarErro('Erro ao cadastrar. Tente novamente.');
            }
        }

        function mostrarErro(msg) {
            const erro = document.getElementById('erroMsg');
            erro.textContent = msg;
            erro.style.display = 'block';
        }
    </script>
</body>
</html>
