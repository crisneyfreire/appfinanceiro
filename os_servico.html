<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔧 APP SERVIÇO - Cliente</title>

    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest_os_cliente.json" />
    <meta name="theme-color" content="#2196F3" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      :root {
        --primary: #2196f3;
        --primary-dark: #1976d2;
        --success: #4caf50;
        --warning: #ff9800;
        --danger: #f44336;
        --gray: #9e9e9e;
        --light: #f5f5f5;
        --dark: #333;
        --urgente: #f44336;
        --normal: #4caf50;
        --bg: #f5f5f5;
      }

      body {
        background: var(--bg);
        min-height: 100vh;
        padding: 15px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: white;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .header h1 {
        font-size: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .cliente-info {
        background: rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 10px;
        margin-top: 10px;
        font-size: 14px;
      }

      /* Mensagens */
      .message {
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        display: none;
      }

      .message.error {
        background: #ffebee;
        color: #d32f2f;
        border-left: 4px solid #d32f2f;
      }

      .message.success {
        background: #e8f5e9;
        color: #2e7d32;
        border-left: 4px solid #2e7d32;
      }

      .message.info {
        background: #e3f2fd;
        color: #1976d2;
        border-left: 4px solid #1976d2;
      }

      /* Cards */
      .card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .card-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
        color: var(--dark);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Formulário */
      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: var(--dark);
        font-weight: 600;
        font-size: 14px;
      }

      .form-group label.required::after {
        content: " *";
        color: var(--danger);
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
      }

      .form-group small {
        display: block;
        margin-top: 5px;
        color: var(--gray);
        font-size: 12px;
      }

      .char-counter {
        text-align: right;
        font-size: 11px;
        color: var(--gray);
        margin-top: 3px;
      }

      .char-counter.warning {
        color: var(--warning);
      }

      .char-counter.danger {
        color: var(--danger);
      }

      /* Prioridade */
      .prioridade-options {
        display: flex;
        gap: 10px;
      }

      .prioridade-btn {
        flex: 1;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        background: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }

      .prioridade-btn.normal {
        color: var(--normal);
        border-color: var(--normal);
      }

      .prioridade-btn.urgente {
        color: var(--urgente);
        border-color: var(--urgente);
      }

      .prioridade-btn.selected.normal {
        background: var(--normal);
        color: white;
      }

      .prioridade-btn.selected.urgente {
        background: var(--urgente);
        color: white;
      }

      /* Upload de fotos */
      .fotos-area {
        border: 2px dashed #ddd;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
      }

      .fotos-area:hover {
        border-color: var(--primary);
        background: #f0f8ff;
      }

      .fotos-preview {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 15px;
      }

      .foto-preview-item {
        position: relative;
        aspect-ratio: 1;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
      }

      .foto-preview-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s;
      }

      .foto-preview-item:hover img {
        transform: scale(1.1);
      }

      .foto-preview-item button {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(255, 0, 0, 0.8);
        color: white;
        border: none;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        z-index: 2;
      }

      .foto-preview-item button:hover {
        background: rgba(255, 0, 0, 1);
      }

      /* Botões */
      .btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* Status */
      .status-badge {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
      }

      .status-nova {
        background: #e3f2fd;
        color: #1976d2;
      }

      .status-aceita {
        background: #fff3e0;
        color: #f57c00;
      }

      .status-em_execucao {
        background: #e8f5e8;
        color: #388e3c;
      }

      .status-concluida {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .status-cancelada {
        background: #ffebee;
        color: #d32f2f;
      }

      /* Timeline */
      .timeline {
        margin-top: 20px;
        padding-left: 20px;
        border-left: 2px solid #ddd;
      }

      .timeline-item {
        position: relative;
        margin-bottom: 15px;
        padding-left: 20px;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: -26px;
        top: 0;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--primary);
      }

      .timeline-date {
        font-size: 11px;
        color: var(--gray);
      }

      .timeline-text {
        font-size: 13px;
        margin-top: 3px;
      }

      /* Lista de OS */
      .os-item {
        background: white;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 10px;
        border-left: 4px solid transparent;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: all 0.3s;
      }

      .os-item:hover {
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .os-item.urgente {
        border-left-color: var(--urgente);
      }

      .os-item.normal {
        border-left-color: var(--normal);
      }

      .os-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .os-titulo {
        font-weight: bold;
        font-size: 16px;
      }

      .os-data {
        font-size: 11px;
        color: var(--gray);
      }

      .os-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }

      /* Modal */
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal-content {
        background: white;
        border-radius: 20px;
        padding: 20px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }

      .modal-header h3 {
        color: var(--dark);
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: var(--gray);
      }

      .modal-close:hover {
        color: var(--danger);
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--primary);
      }

      .loading-spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid var(--primary);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Instalar banner */
      .install-banner {
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        display: none;
      }

      .install-btn {
        background: white;
        color: var(--primary);
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
      }

      /* Modal de foto */
      .modal-foto {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        cursor: pointer;
      }

      .modal-foto img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 10px;
      }

      /* Arquivo entregue */
      .arquivo-entregue {
        margin: 15px 0;
        padding: 15px;
        background: #e8f5e9;
        border-radius: 10px;
        border-left: 4px solid var(--success);
      }

      .arquivo-entregue a {
        color: var(--success);
        text-decoration: none;
        font-weight: bold;
        display: block;
        margin-top: 10px;
      }

      .arquivo-entregue a:hover {
        text-decoration: underline;
      }

      /* Utilitários */
      .hidden {
        display: none;
      }

      .text-center {
        text-align: center;
      }

      .mt-20 {
        margin-top: 20px;
      }

      .mb-10 {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Banner de instalação PWA -->
      <div class="install-banner" id="installBanner">
        <div>
          <strong>📱 Instalar APP SERVIÇO</strong>
          <p style="font-size: 12px">
            Instale no seu celular para usar offline
          </p>
        </div>
        <button class="install-btn" id="installBtn">Instalar</button>
      </div>

      <!-- Container de mensagens -->
      <div id="messageContainer"></div>

      <!-- Header -->
      <div class="header">
        <h1>
          <span>🔧 APP SERVIÇO</span>
        </h1>
        <div class="cliente-info" id="clienteInfo">
          <span id="clienteNome">Carregando...</span>
        </div>
      </div>

      <!-- Formulário Nova OS -->
      <div class="card">
        <div class="card-title">
          <span>📝 Nova Ordem de Serviço</span>
        </div>

        <div class="form-group">
          <label class="required">Título</label>
          <input
            type="text"
            id="osTitulo"
            placeholder="Ex: Conserto de torneira"
            maxlength="100"
          />
          <div class="char-counter" id="tituloCounter">0/100</div>
        </div>

        <div class="form-group">
          <label class="required">Descrição</label>
          <textarea
            id="osDescricao"
            placeholder="Descreva o problema em detalhes..."
            maxlength="1000"
          ></textarea>
          <div class="char-counter" id="descricaoCounter">0/1000</div>
        </div>

        <div class="form-group">
          <label>Prioridade</label>
          <div class="prioridade-options">
            <button
              class="prioridade-btn normal selected"
              id="prioridadeNormal"
              onclick="setPrioridade('normal')"
              type="button"
            >
              📋 Normal
            </button>
            <button
              class="prioridade-btn urgente"
              id="prioridadeUrgente"
              onclick="setPrioridade('urgente')"
              type="button"
            >
              ⚡ Urgente
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Fotos (máx 3)</label>
          <div
            class="fotos-area"
            id="fotosArea"
            onclick="document.getElementById('fotosInput').click()"
          >
            <span style="font-size: 40px">📷</span>
            <p>Clique para adicionar fotos</p>
            <p style="font-size: 12px; color: var(--gray)">
              Até 3 fotos (max 5MB cada)
            </p>
          </div>
          <input
            type="file"
            id="fotosInput"
            multiple
            accept="image/jpeg,image/png,image/jpg"
            style="display: none"
            onchange="previewFotos(event)"
          />
          <div class="fotos-preview" id="fotosPreview"></div>
        </div>

        <button class="btn btn-primary" onclick="criarOS()" id="btnCriarOS">
          ➕ SOLICITAR SERVIÇO
        </button>
      </div>

      <!-- Minhas Ordens -->
      <div class="card">
        <div class="card-title">
          <span>📋 Minhas Ordens de Serviço</span>
        </div>

        <div id="listaOS">
          <div class="loading">
            <div class="loading-spinner"></div>
            Carregando...
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Detalhes da OS -->
    <div class="modal" id="modalOS">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitulo">Detalhes da OS</h3>
          <button class="modal-close" onclick="fecharModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- Conteúdo dinâmico -->
        </div>
      </div>
    </div>

    <!-- Modal Visualizar Foto -->
    <div class="modal-foto" id="modalFoto" onclick="fecharModalFoto()">
      <img id="fotoAmpliada" src="" alt="Foto ampliada" />
    </div>

    <script>
      // ============================================
      // CONFIGURAÇÃO FIREBASE
      // ============================================
      const firebaseConfig = {
        apiKey: "AIzaSyArkRZLVVJNzx6I6GcWVF7NnjIkrF1jrcU",
        authDomain: "painelmastercomplet.firebaseapp.com",
        projectId: "painelmastercomplet",
        storageBucket: "painelmastercomplet.firebasestorage.app",
        messagingSenderId: "87580974705",
        appId: "1:87580974705:web:bd17f8609687f25ee4c5d0",
      };

      // Inicializar Firebase
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const storage = firebase.storage();

      // ============================================
      // VARIÁVEIS GLOBAIS
      // ============================================
      const params = new URLSearchParams(window.location.search);
      const clienteId = params.get("cliente");
      const MEU_PRESTADOR_ID = "prestador_principal";

      let prioridadeSelecionada = "normal";
      let fotosSelecionadas = [];
      let osListener = null;
      let ordens = [];

      // ============================================
      // INICIALIZAÇÃO
      // ============================================
      window.onload = function () {
        if (!clienteId) {
          mostrarMensagem("error", "ID do cliente não encontrado!");
          setTimeout(() => {
            window.location.href = "os_cadastro.html";
          }, 2000);
          return;
        }

        carregarCliente();
        carregarOrdens();
        setupPWAInstall();
        setupCounters();
      };

      // ============================================
      // FUNÇÕES DE UTILIDADE
      // ============================================
      function mostrarMensagem(tipo, texto) {
        const container = document.getElementById("messageContainer");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${tipo}`;
        msgDiv.textContent = texto;
        container.innerHTML = "";
        container.appendChild(msgDiv);

        setTimeout(() => {
          msgDiv.remove();
        }, 5000);
      }

      function setupCounters() {
        const titulo = document.getElementById("osTitulo");
        const descricao = document.getElementById("osDescricao");

        titulo.addEventListener("input", function () {
          const length = this.value.length;
          const counter = document.getElementById("tituloCounter");
          counter.textContent = `${length}/100`;

          if (length > 90) {
            counter.className = "char-counter warning";
          } else {
            counter.className = "char-counter";
          }
        });

        descricao.addEventListener("input", function () {
          const length = this.value.length;
          const counter = document.getElementById("descricaoCounter");
          counter.textContent = `${length}/1000`;

          if (length > 900) {
            counter.className = "char-counter warning";
          } else {
            counter.className = "char-counter";
          }
        });
      }

      // ============================================
      // CARREGAR DADOS DO CLIENTE
      // ============================================
      async function carregarCliente() {
        try {
          const doc = await db.collection("clientes_os").doc(clienteId).get();
          if (doc.exists) {
            const dados = doc.data();
            document.getElementById("clienteNome").textContent =
              `👤 ${dados.nome}`;
          } else {
            mostrarMensagem("error", "Cliente não encontrado!");
            setTimeout(() => {
              window.location.href = "os_cadastro.html";
            }, 2000);
          }
        } catch (error) {
          console.error("Erro ao carregar cliente:", error);
          mostrarMensagem("error", "Erro ao carregar dados do cliente");
        }
      }

      // ============================================
      // ORDENS DE SERVIÇO
      // ============================================
      function carregarOrdens() {
        if (osListener) osListener();

        osListener = db
          .collection("ordens_servico")
          .where("clienteId", "==", clienteId)
          .orderBy("criadoEm", "desc")
          .onSnapshot(
            (snapshot) => {
              ordens = [];
              snapshot.forEach((doc) => {
                const data = doc.data();
                ordens.push({
                  id: doc.id,
                  ...data,
                  criadoEm: data.criadoEm?.toDate() || new Date(),
                });
              });
              renderizarOrdens();
            },
            (error) => {
              console.error("Erro ao carregar OS:", error);
              document.getElementById("listaOS").innerHTML = `
                        <div style="text-align: center; color: var(--danger); padding: 20px;">
                            ❌ Erro ao carregar ordens
                        </div>
                    `;
            },
          );
      }

      function renderizarOrdens() {
        const lista = document.getElementById("listaOS");

        if (ordens.length === 0) {
          lista.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: var(--gray);">
                        📭 Nenhuma ordem de serviço encontrada
                        <p style="margin-top: 10px;">Clique em "SOLICITAR SERVIÇO" para criar uma</p>
                    </div>
                `;
          return;
        }

        let html = "";
        ordens.forEach((os) => {
          const data = os.criadoEm.toLocaleDateString("pt-BR");
          const statusClass = getStatusClass(os.status);

          html += `
                    <div class="os-item ${os.prioridade}" onclick="abrirOS('${os.id}')">
                        <div class="os-header">
                            <span class="os-titulo">${os.titulo || "Sem título"}</span>
                            <span class="status-badge ${statusClass}">${getStatusTexto(os.status)}</span>
                        </div>
                        <div style="font-size: 13px; color: #666; margin-bottom: 5px;">
                            ${os.descricao?.substring(0, 60)}${os.descricao?.length > 60 ? "..." : ""}
                        </div>
                        <div class="os-footer">
                            <span class="os-data">📅 ${data}</span>
                            <span style="color: ${os.prioridade === "urgente" ? "var(--urgente)" : "var(--normal)"}">
                                ${os.prioridade === "urgente" ? "⚡ Urgente" : "📋 Normal"}
                            </span>
                        </div>
                        ${os.anexos?.length ? `<span style="font-size: 11px;">📷 ${os.anexos.length} foto(s)</span>` : ""}
                    </div>
                `;
        });

        lista.innerHTML = html;
      }

      function getStatusClass(status) {
        const map = {
          nova: "status-nova",
          aceita: "status-aceita",
          em_execucao: "status-em_execucao",
          concluida: "status-concluida",
          cancelada: "status-cancelada",
        };
        return map[status] || "status-nova";
      }

      function getStatusTexto(status) {
        const map = {
          nova: "Nova",
          aceita: "Aceita",
          em_execucao: "Em Execução",
          concluida: "Concluída",
          cancelada: "Cancelada",
        };
        return map[status] || status;
      }

      // ============================================
      // CRIAR NOVA OS
      // ============================================
      function setPrioridade(prioridade) {
        prioridadeSelecionada = prioridade;

        document
          .getElementById("prioridadeNormal")
          .classList.remove("selected");
        document
          .getElementById("prioridadeUrgente")
          .classList.remove("selected");

        if (prioridade === "normal") {
          document.getElementById("prioridadeNormal").classList.add("selected");
        } else {
          document
            .getElementById("prioridadeUrgente")
            .classList.add("selected");
        }
      }

      function previewFotos(event) {
        const files = Array.from(event.target.files);
        const MAX_SIZE = 5 * 1024 * 1024; // 5MB

        // Validar tamanho dos arquivos
        const validFiles = files.filter((file) => {
          if (file.size > MAX_SIZE) {
            mostrarMensagem("error", `Arquivo ${file.name} excede 5MB`);
            return false;
          }
          return true;
        });

        fotosSelecionadas = validFiles.slice(0, 3);

        const preview = document.getElementById("fotosPreview");
        preview.innerHTML = "";

        fotosSelecionadas.forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = function (e) {
            const div = document.createElement("div");
            div.className = "foto-preview-item";
            div.innerHTML = `
                        <img src="${e.target.result}" onclick="visualizarFoto('${e.target.result}')">
                        <button onclick="removerFoto(${index})">×</button>
                    `;
            preview.appendChild(div);
          };
          reader.readAsDataURL(file);
        });
      }

      function removerFoto(index) {
        fotosSelecionadas.splice(index, 1);
        previewFotos({ target: { files: fotosSelecionadas } });
      }

      async function criarOS() {
        const titulo = document.getElementById("osTitulo").value.trim();
        const descricao = document.getElementById("osDescricao").value.trim();

        if (!titulo) {
          mostrarMensagem("error", "Preencha o título!");
          return;
        }

        if (!descricao) {
          mostrarMensagem("error", "Preencha a descrição!");
          return;
        }

        const btn = document.getElementById("btnCriarOS");
        btn.disabled = true;
        btn.innerHTML = "⏳ Enviando...";

        try {
          // Upload das fotos
          const anexos = [];
          for (let i = 0; i < fotosSelecionadas.length; i++) {
            const file = fotosSelecionadas[i];
            const path = `os/${clienteId}/${Date.now()}_${i}_${file.name}`;
            const ref = storage.ref().child(path);

            await ref.put(file, {
              contentType: file.type,
            });

            const url = await ref.getDownloadURL();
            anexos.push(url);
          }

          // Criar OS no Firestore
          const osData = {
            clienteId: clienteId,
            prestadorId: MEU_PRESTADOR_ID,
            titulo: titulo,
            descricao: descricao,
            prioridade: prioridadeSelecionada,
            status: "nova",
            anexos: anexos,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
            atualizadoEm: firebase.firestore.FieldValue.serverTimestamp(),
          };

          const docRef = await db.collection("ordens_servico").add(osData);

          // Adicionar evento inicial
          await db
            .collection("ordens_servico")
            .doc(docRef.id)
            .collection("eventos")
            .add({
              tipo: "criacao",
              texto: "Ordem de serviço criada",
              quando: firebase.firestore.FieldValue.serverTimestamp(),
              autor: "cliente",
            });

          // Limpar formulário
          document.getElementById("osTitulo").value = "";
          document.getElementById("osDescricao").value = "";
          document.getElementById("tituloCounter").textContent = "0/100";
          document.getElementById("descricaoCounter").textContent = "0/1000";
          fotosSelecionadas = [];
          document.getElementById("fotosPreview").innerHTML = "";
          setPrioridade("normal");

          mostrarMensagem("success", "✅ Ordem de serviço criada com sucesso!");
        } catch (error) {
          console.error("Erro ao criar OS:", error);
          mostrarMensagem("error", "❌ Erro ao criar OS: " + error.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = "➕ SOLICITAR SERVIÇO";
        }
      }

      // ============================================
      // DETALHES DA OS
      // ============================================
      async function abrirOS(osId) {
        const os = ordens.find((o) => o.id === osId);
        if (!os) return;

        try {
          // Carregar eventos
          const eventosSnapshot = await db
            .collection("ordens_servico")
            .doc(osId)
            .collection("eventos")
            .orderBy("quando", "desc")
            .get();

          const eventos = [];
          eventosSnapshot.forEach((doc) => {
            const data = doc.data();
            eventos.push({
              ...data,
              quando: data.quando?.toDate() || new Date(),
            });
          });

          // Montar HTML
          const dataCriacao = os.criadoEm.toLocaleString("pt-BR");

          let fotosHtml = "";
          if (os.anexos && os.anexos.length > 0) {
            fotosHtml =
              '<div style="margin: 15px 0;"><strong>📷 Fotos:</strong><div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 10px;">';
            os.anexos.forEach((url) => {
              fotosHtml += `<img src="${url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer;" onclick="visualizarFoto('${url}'); event.stopPropagation()">`;
            });
            fotosHtml += "</div></div>";
          }

          let eventosHtml =
            '<div style="margin-top: 20px;"><strong>📋 Histórico:</strong><div class="timeline">';
          eventos.forEach((ev) => {
            const data = ev.quando.toLocaleString("pt-BR");
            eventosHtml += `
                        <div class="timeline-item">
                            <div class="timeline-date">${data}</div>
                            <div class="timeline-text">${ev.texto}</div>
                        </div>
                    `;
          });
          eventosHtml += "</div></div>";

          let arquivoHtml = "";
          if (os.arquivoEntrega) {
            arquivoHtml = `
                        <div class="arquivo-entregue">
                            <strong>✅ Serviço concluído!</strong>
                            <a href="${os.arquivoEntrega}" target="_blank">📎 Baixar arquivo</a>
                        </div>
                    `;
          }

          document.getElementById("modalBody").innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <span class="status-badge ${getStatusClass(os.status)}">${getStatusTexto(os.status)}</span>
                        <span style="float: right;">${os.prioridade === "urgente" ? "⚡ Urgente" : "📋 Normal"}</span>
                    </div>
                    
                    <h4>${os.titulo}</h4>
                    <p style="margin: 10px 0; background: #f5f5f5; padding: 10px; border-radius: 8px;">
                        ${os.descricao}
                    </p>
                    
                    <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                        📅 Criado em: ${dataCriacao}
                    </div>
                    
                    ${arquivoHtml}
                    ${fotosHtml}
                    ${eventosHtml}
                `;

          document.getElementById("modalOS").style.display = "flex";
        } catch (error) {
          console.error("Erro ao abrir OS:", error);
          mostrarMensagem("error", "Erro ao carregar detalhes da OS");
        }
      }

      function visualizarFoto(url) {
        document.getElementById("fotoAmpliada").src = url;
        document.getElementById("modalFoto").style.display = "flex";
      }

      function fecharModal() {
        document.getElementById("modalOS").style.display = "none";
      }

      function fecharModalFoto() {
        document.getElementById("modalFoto").style.display = "none";
      }

      // ============================================
      // PWA - INSTALAÇÃO
      // ============================================
      let deferredPrompt;

      function setupPWAInstall() {
        window.addEventListener("beforeinstallprompt", (e) => {
          e.preventDefault();
          deferredPrompt = e;
          document.getElementById("installBanner").style.display = "flex";
        });

        document
          .getElementById("installBtn")
          .addEventListener("click", async () => {
            if (!deferredPrompt) return;

            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;

            if (outcome === "accepted") {
              document.getElementById("installBanner").style.display = "none";
            }

            deferredPrompt = null;
          });

        window.addEventListener("appinstalled", () => {
          document.getElementById("installBanner").style.display = "none";
          console.log("✅ App instalado!");
        });
      }

      // Fechar modal ao clicar fora
      window.onclick = function (event) {
        const modal = document.getElementById("modalOS");
        if (event.target === modal) {
          fecharModal();
        }
      };
    </script>
  </body>
</html>
