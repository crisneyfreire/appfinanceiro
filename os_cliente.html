<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 APP SERVIÇO - Cliente</title>
    
    <link rel="manifest" href="manifest_os_cliente.json">
    <meta name="theme-color" content="#2196F3">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #2196F3;
            --primary-dark: #1976D2;
            --success: #4CAF50;
            --warning: #FF9800;
            --danger: #F44336;
            --gray: #9E9E9E;
            --light: #F5F5F5;
            --dark: #333;
            --urgente: #F44336;
            --normal: #4CAF50;
            --bg: #f5f5f5;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cliente-info {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .prioridade-options {
            display: flex;
            gap: 10px;
        }

        .prioridade-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .prioridade-btn.normal {
            color: var(--normal);
            border-color: var(--normal);
        }

        .prioridade-btn.urgente {
            color: var(--urgente);
            border-color: var(--urgente);
        }

        .prioridade-btn.selected.normal {
            background: var(--normal);
            color: white;
        }

        .prioridade-btn.selected.urgente {
            background: var(--urgente);
            color: white;
        }

        .fotos-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .fotos-area:hover {
            border-color: var(--primary);
            background: #f0f8ff;
        }

        .fotos-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .foto-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
        }

        .foto-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .foto-preview-item button {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33,150,243,0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-nova { background: #E3F2FD; color: #1976D2; }
        .status-aceita { background: #FFF3E0; color: #F57C00; }
        .status-execucao { background: #E8F5E8; color: #388E3C; }
        .status-concluida { background: #E8F5E9; color: #2E7D32; }
        .status-cancelada { background: #FFEBEE; color: #D32F2F; }

        .timeline {
            margin-top: 20px;
            padding-left: 20px;
            border-left: 2px solid #ddd;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 15px;
            padding-left: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
        }

        .timeline-date { font-size: 11px; color: var(--gray); }
        .timeline-text { font-size: 13px; margin-top: 3px; }

        .os-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }

        .os-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .os-item.urgente { border-left-color: var(--urgente); }
        .os-item.normal { border-left-color: var(--normal); }

        .os-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .os-titulo { font-weight: bold; font-size: 16px; }
        .os-data { font-size: 11px; color: var(--gray); }

        .os-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }

        .notificacao {
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .install-banner {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            display: none;
        }

        .install-btn {
            background: white;
            color: var(--primary);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="install-banner" id="installBanner">
            <div>
                <strong>📱 Instalar APP SERVIÇO</strong>
                <p style="font-size: 12px;">Instale no seu celular para usar offline</p>
            </div>
            <button class="install-btn" id="installBtn">Instalar</button>
        </div>

        <div class="header">
            <h1>
                <span>🔧 APP SERVIÇO</span>
            </h1>
            <div class="cliente-info" id="clienteInfo">
                <span id="clienteNome">Carregando...</span>
            </div>
        </div>

        <div id="notificacoes"></div>

        <div class="card">
            <div class="card-title">
                <span>📝 Nova Ordem de Serviço</span>
            </div>
            
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="osTitulo" placeholder="Ex: Criar arte para panfleto">
            </div>
            
            <div class="form-group">
                <label>Descrição</label>
                <textarea id="osDescricao" placeholder="Descreva o que precisa..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Prioridade</label>
                <div class="prioridade-options">
                    <button class="prioridade-btn normal" id="prioridadeNormal" onclick="setPrioridade('normal')">📋 Normal</button>
                    <button class="prioridade-btn urgente" id="prioridadeUrgente" onclick="setPrioridade('urgente')">⚡ Urgente</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Fotos (máx 3)</label>
                <div class="fotos-area" id="fotosArea" onclick="document.getElementById('fotosInput').click()">
                    <span style="font-size: 40px;">📷</span>
                    <p>Clique para adicionar fotos</p>
                </div>
                <input type="file" id="fotosInput" multiple accept="image/*" style="display: none;" onchange="previewFotos(event)">
                <div class="fotos-preview" id="fotosPreview"></div>
            </div>
            
            <button class="btn btn-primary" onclick="criarOS()" id="btnCriarOS">
                ➕ SOLICITAR SERVIÇO
            </button>
        </div>

        <div class="card">
            <div class="card-title">
                <span>📋 Minhas Ordens de Serviço</span>
            </div>
            
            <div id="listaOS">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Carregando...
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modalOS">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitulo">Detalhes da OS</h3>
                <button class="modal-close" onclick="fecharModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <audio id="somNotificacao" preload="auto">
        <source src="data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAADIABvb3RzHR4AAAAAAAAAAAAAAAAAAAAAAQADe3t7AAAAAEpSQ09ERQAAAEEAAAMgMDVhY2U4ZDU4MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMAAA//sQZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAwFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//sQZAAP8AAAGkAAAAIAAANIAAAASAAAAaQAAAAgAAA0gAAABFXhpZmVNyysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrK//sQZAAP8AAAGkAAAAIAAANIAAAASAAAAaQAAAAgAAA0gAAABVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV" type="audio/mp3">
    </audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArkRZLVVJNzx6I6GcWVF7NnjIkrF1jrcU",
            authDomain: "painelmastercomplet.firebaseapp.com",
            projectId: "painelmastercomplet",
            storageBucket: "painelmastercomplet.firebasestorage.app",
            messagingSenderId: "87580974705",
            appId: "1:87580974705:web:bd17f8609687f25ee4c5d0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        const params = new URLSearchParams(window.location.search);
        const clienteId = params.get('cliente');
        
        if (!clienteId) {
            window.location.href = 'os_cadastro.html';
        }

        let prioridadeSelecionada = 'normal';
        let fotosSelecionadas = [];
        let osListener = null;
        let ordens = [];
        const MEU_PRESTADOR_ID = 'prestador_principal';

        window.onload = async function() {
            const ativo = await verificarAppAtivo();
            if (ativo) {
                carregarDadosCliente();
                carregarOrdens();
                setupPWAInstall();
                ouvirNotificacoes();
            }
        };

        async function verificarAppAtivo() {
            try {
                const doc = await db.collection('config_global').doc('apps').get();
                if (doc.exists) {
                    const config = doc.data().os || {};
                    if (!config.ativo) {
                        document.body.innerHTML = `
                            <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5;">
                                <div style="background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px;">
                                    <h1 style="font-size: 48px; margin-bottom: 20px;">🔧</h1>
                                    <h2 style="color: #f44336; margin-bottom: 15px;">Sistema em Manutenção</h2>
                                    <p style="color: #666; margin-bottom: 20px;">${config.mensagemManutencao || 'Tente novamente mais tarde.'}</p>
                                    <button onclick="window.location.reload()" style="background: #4CAF50; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer;">Tentar novamente</button>
                                </div>
                            </div>
                        `;
                        return false;
                    }
                }
                return true;
            } catch (error) {
                console.error('Erro ao verificar app:', error);
                return true;
            }
        }

        async function carregarDadosCliente() {
            try {
                const doc = await db.collection('clientes_os').doc(clienteId).get();
                if (doc.exists) {
                    const dados = doc.data();
                    document.getElementById('clienteNome').textContent = `👤 ${dados.nome}`;
                }
            } catch (error) {
                console.error('Erro ao carregar cliente:', error);
            }
        }

        function setPrioridade(prioridade) {
            prioridadeSelecionada = prioridade;
            document.getElementById('prioridadeNormal').classList.remove('selected');
            document.getElementById('prioridadeUrgente').classList.remove('selected');
            document.getElementById(`prioridade${prioridade.charAt(0).toUpperCase() + prioridade.slice(1)}`).classList.add('selected');
        }

        function previewFotos(event) {
            const files = Array.from(event.target.files);
            fotosSelecionadas = files.slice(0, 3);
            
            const preview = document.getElementById('fotosPreview');
            preview.innerHTML = '';
            
            fotosSelecionadas.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'foto-preview-item';
                    div.innerHTML = `
                        <img src="${e.target.result}">
                        <button onclick="removerFoto(${index})">×</button>
                    `;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function removerFoto(index) {
            fotosSelecionadas.splice(index, 1);
            previewFotos({ target: { files: fotosSelecionadas } });
        }

        async function criarOS() {
            const titulo = document.getElementById('osTitulo').value;
            const descricao = document.getElementById('osDescricao').value;

            if (!titulo || !descricao) {
                alert('Preencha título e descrição!');
                return;
            }

            const btn = document.getElementById('btnCriarOS');
            btn.disabled = true;
            btn.innerHTML = '⏳ Enviando...';

            try {
                const anexos = [];
                for (let i = 0; i < fotosSelecionadas.length; i++) {
                    const file = fotosSelecionadas[i];
                    const path = `os/${clienteId}/${Date.now()}_${i}_${file.name}`;
                    const ref = storage.ref().child(path);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    anexos.push(url);
                }

                const osData = {
                    clienteId: clienteId,
                    prestadorId: MEU_PRESTADOR_ID,
                    titulo: titulo,
                    descricao: descricao,
                    prioridade: prioridadeSelecionada,
                    status: 'nova',
                    anexos: anexos,
                    criadoEm: new Date().toISOString(),
                    atualizadoEm: new Date().toISOString()
                };

                const docRef = await db.collection('ordens_servico').add(osData);

                await db.collection('ordens_servico').doc(docRef.id)
                    .collection('eventos').add({
                        tipo: 'criacao',
                        texto: 'Ordem de serviço criada',
                        quando: new Date().toISOString(),
                        autor: 'cliente'
                    });

                document.getElementById('osTitulo').value = '';
                document.getElementById('osDescricao').value = '';
                fotosSelecionadas = [];
                document.getElementById('fotosPreview').innerHTML = '';
                setPrioridade('normal');

                alert('✅ Ordem de serviço criada!');

            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao criar OS');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '➕ SOLICITAR SERVIÇO';
            }
        }

        function carregarOrdens() {
            if (osListener) osListener();

            osListener = db.collection('ordens_servico')
                .where('clienteId', '==', clienteId)
                .orderBy('criadoEm', 'desc')
                .onSnapshot((snapshot) => {
                    ordens = [];
                    snapshot.forEach(doc => {
                        ordens.push({ id: doc.id, ...doc.data() });
                    });
                    renderizarOrdens();
                });
        }

        function renderizarOrdens() {
            const lista = document.getElementById('listaOS');
            
            if (ordens.length === 0) {
                lista.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: var(--gray);">
                        📭 Nenhuma ordem de serviço
                    </div>
                `;
                return;
            }

            let html = '';
            ordens.forEach(os => {
                const data = new Date(os.criadoEm).toLocaleDateString('pt-BR');
                const statusClass = getStatusClass(os.status);
                
                html += `
                    <div class="os-item ${os.prioridade}" onclick="abrirOS('${os.id}')">
                        <div class="os-header">
                            <span class="os-titulo">${os.titulo}</span>
                            <span class="status-badge ${statusClass}">${getStatusTexto(os.status)}</span>
                        </div>
                        <div style="font-size: 13px; color: #666; margin-bottom: 5px;">
                            ${os.descricao.substring(0, 60)}${os.descricao.length > 60 ? '...' : ''}
                        </div>
                        <div class="os-footer">
                            <span class="os-data">📅 ${data}</span>
                            <span style="color: ${os.prioridade === 'urgente' ? 'var(--urgente)' : 'var(--normal)'}">
                                ${os.prioridade === 'urgente' ? '⚡ Urgente' : '📋 Normal'}
                            </span>
                        </div>
                    </div>
                `;
            });

            lista.innerHTML = html;
        }

        function getStatusClass(status) {
            const map = {
                'nova': 'status-nova',
                'aceita': 'status-aceita',
                'em_execucao': 'status-execucao',
                'concluida': 'status-concluida',
                'cancelada': 'status-cancelada'
            };
            return map[status] || 'status-nova';
        }

        function getStatusTexto(status) {
            const map = {
                'nova': 'Nova',
                'aceita': 'Aceita',
                'em_execucao': 'Execução',
                'concluida': 'Concluída',
                'cancelada': 'Cancelada'
            };
            return map[status] || status;
        }

        async function abrirOS(osId) {
            const os = ordens.find(o => o.id === osId);
            if (!os) return;

            const eventosSnapshot = await db.collection('ordens_servico').doc(osId)
                .collection('eventos')
                .orderBy('quando', 'desc')
                .get();

            const eventos = [];
            eventosSnapshot.forEach(doc => eventos.push(doc.data()));

            const dataCriacao = new Date(os.criadoEm).toLocaleString('pt-BR');
            
            let fotosHtml = '';
            if (os.anexos && os.anexos.length > 0) {
                fotosHtml = '<div style="margin: 15px 0;"><strong>📷 Fotos:</strong><div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 10px;">';
                os.anexos.forEach(url => {
                    fotosHtml += `<img src="${url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px;">`;
                });
                fotosHtml += '</div></div>';
            }

            let eventosHtml = '<div style="margin-top: 20px;"><strong>📋 Histórico:</strong><div class="timeline">';
            eventos.forEach(ev => {
                const data = new Date(ev.quando).toLocaleString('pt-BR');
                eventosHtml += `
                    <div class="timeline-item">
                        <div class="timeline-date">${data}</div>
                        <div class="timeline-text">${ev.texto}</div>
                    </div>
                `;
            });
            eventosHtml += '</div></div>';

            let arquivoHtml = '';
            if (os.arquivoEntrega) {
                arquivoHtml = `
                    <div style="margin: 15px 0; padding: 15px; background: #e8f5e9; border-radius: 8px;">
                        <strong>✅ Serviço concluído!</strong>
                        <a href="${os.arquivoEntrega}" target="_blank" style="display: block; margin-top: 10px; color: var(--success);">📎 Baixar arquivo</a>
                    </div>
                `;
            }

            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom: 15px;">
                    <span class="status-badge ${getStatusClass(os.status)}">${getStatusTexto(os.status)}</span>
                    <span style="float: right;">${os.prioridade === 'urgente' ? '⚡ Urgente' : '📋 Normal'}</span>
                </div>
                
                <h4>${os.titulo}</h4>
                <p style="margin: 10px 0; background: #f5f5f5; padding: 10px; border-radius: 8px;">
                    ${os.descricao}
                </p>
                
                <div style="font-size: 12px; color: #666; margin-bottom: 10px;">
                    📅 Criado em: ${dataCriacao}
                </div>
                
                ${arquivoHtml}
                ${fotosHtml}
                ${eventosHtml}
            `;

            document.getElementById('modalOS').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalOS').style.display = 'none';
        }

        function ouvirNotificacoes() {
            db.collection('notificacoes')
                .where('clienteId', '==', clienteId)
                .where('lida', '==', false)
                .onSnapshot(snapshot => {
                    snapshot.forEach(change => {
                        if (change.type === 'added') {
                            const notif = change.data();
                            mostrarNotificacao(notif);
                            
                            // Marcar como lida
                            db.collection('notificacoes').doc(change.id).update({
                                lida: true
                            });
                        }
                    });
                });
        }

        function mostrarNotificacao(notif) {
            const area = document.getElementById('notificacoes');
            const notifDiv = document.createElement('div');
            notifDiv.className = 'notificacao';
            notifDiv.innerHTML = `
                🔔 ${notif.mensagem}
                <button onclick="this.parentElement.remove()" style="float: right; background: none; border: none; color: white; cursor: pointer;">×</button>
            `;
            area.appendChild(notifDiv);
            
            document.getElementById('somNotificacao').play().catch(() => {});
            
            setTimeout(() => {
                notifDiv.remove();
            }, 5000);
        }

        function setupPWAInstall() {
            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installBanner').style.display = 'flex';
            });

            document.getElementById('installBtn').addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBanner').style.display = 'none';
                }
                deferredPrompt = null;
            });
        }
    </script>
</body>
</html>
